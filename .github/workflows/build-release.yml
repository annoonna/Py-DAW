# .github/workflows/build-release.yml
# Baut Py_DAW für Linux, macOS und Windows automatisch.
# Trigger: Tag wie v0.0.20.731 pushen oder manuell starten.

name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            rust_target: x86_64-unknown-linux-gnu
            engine_bin: pydaw_engine
            artifact: ChronoScaleStudio-linux-x86_64
          - os: macos-15
            platform: macos
            rust_target: aarch64-apple-darwin
            engine_bin: pydaw_engine
            artifact: ChronoScaleStudio-macos-arm64
          - os: windows-latest
            platform: windows
            rust_target: x86_64-pc-windows-msvc
            engine_bin: pydaw_engine.exe
            artifact: ChronoScaleStudio-windows-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pydaw_engine

      - name: Linux Deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libgl1-mesa-dev patchelf

      - name: Python Deps
        run: |
          pip install --upgrade pip setuptools wheel
          pip install PyQt6 numpy scipy sounddevice soundfile mido pydub msgpack
          pip install pedalboard numba llvmlite
          pip install nuitka ordered-set

      - name: Rust Engine bauen
        working-directory: pydaw_engine
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Rust Tests
        if: matrix.platform == 'linux'
        working-directory: pydaw_engine
        run: cargo test

      - name: Paket erstellen
        shell: bash
        run: |
          VERSION=$(cat VERSION)
          DIST="dist/${{ matrix.artifact }}"
          mkdir -p "$DIST"

          echo "=== Versuche Nuitka Build ==="
          if python -m nuitka \
            --standalone \
            --enable-plugin=pyqt6 \
            --output-dir=build_nuitka \
            --assume-yes-for-download \
            --no-pyi-file \
            --include-package=pydaw \
            --product-name=ChronoScaleStudio \
            --product-version="$VERSION" \
            main.py 2>&1; then

            echo "Nuitka erfolgreich"
            NUITKA_OUT=$(find build_nuitka -maxdepth 1 -name "*.dist" -type d | head -1)
            if [ -d "$NUITKA_OUT" ]; then
              cp -r "$NUITKA_OUT"/* "$DIST/"
            fi
          else
            echo "Nuitka fehlgeschlagen — erstelle Source-Paket"
            cp -r pydaw "$DIST/pydaw"
            cp main.py "$DIST/"
            cp setup_all.py "$DIST/"
            cp requirements.txt "$DIST/"
            if [ "${{ matrix.platform }}" != "windows" ]; then
              printf '#!/bin/bash\ncd "$(dirname "$0")"\npython3 main.py "$@"\n' > "$DIST/start.sh"
              chmod +x "$DIST/start.sh"
            else
              printf '@echo off\npython main.py %%*\n' > "$DIST/start.bat"
            fi
          fi

          ENGINE="pydaw_engine/target/${{ matrix.rust_target }}/release/${{ matrix.engine_bin }}"
          if [ -f "$ENGINE" ]; then
            cp "$ENGINE" "$DIST/${{ matrix.engine_bin }}"
            [ "${{ matrix.platform }}" != "windows" ] && chmod +x "$DIST/${{ matrix.engine_bin }}"
            echo "Rust Engine eingebettet"
          fi

          cp VERSION "$DIST/" 2>/dev/null || true
          echo "=== Paketinhalt ==="
          ls -la "$DIST/" | head -20

      - name: Archiv (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar czf "../${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Archiv (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\${{ matrix.artifact }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.zip
          generate_release_notes: true
