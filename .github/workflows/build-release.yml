# .github/workflows/build-release.yml
# Builds Py_DAW for Linux, macOS, and Windows automatically.
# Trigger: Push a tag like v0.0.20.728 or manually via workflow_dispatch.

name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 0.0.20.728)'
        required: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            rust_target: x86_64-unknown-linux-gnu
            artifact: ChronoScaleStudio-linux-x86_64.tar.gz
          - os: macos-13
            platform: macos
            rust_target: x86_64-apple-darwin
            artifact: ChronoScaleStudio-macos-x86_64.tar.gz
          - os: macos-14
            platform: macos
            rust_target: aarch64-apple-darwin
            artifact: ChronoScaleStudio-macos-arm64.tar.gz
          - os: windows-latest
            platform: windows
            rust_target: x86_64-pc-windows-msvc
            artifact: ChronoScaleStudio-windows-x86_64.zip

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pydaw_engine

      # Linux: Install ALSA headers + audio deps
      - name: Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libgl1-mesa-dev

      # Install Python deps + Nuitka
      - name: Python deps
        run: |
          pip install --upgrade pip
          pip install nuitka ordered-set
          pip install PyQt6 numpy scipy sounddevice soundfile mido pydub msgpack pedalboard numba

      # Build Rust engine
      - name: Build Rust engine
        working-directory: pydaw_engine
        run: cargo build --release --target ${{ matrix.rust_target }}

      # Build with Nuitka
      - name: Build with Nuitka
        run: python build_release.py --skip-rust --skip-package

      # Embed Rust binary
      - name: Embed Rust binary
        shell: bash
        run: |
          VERSION=$(cat VERSION)
          DIST="dist/ChronoScaleStudio-${VERSION}-${{ matrix.platform }}"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp pydaw_engine/target/${{ matrix.rust_target }}/release/pydaw_engine.exe "${DIST}/"
          else
            cp pydaw_engine/target/${{ matrix.rust_target }}/release/pydaw_engine "${DIST}/"
            chmod +x "${DIST}/pydaw_engine"
          fi
          cp VERSION "${DIST}/"

      # Package
      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          VERSION=$(cat VERSION)
          cd dist
          tar czf "../${{ matrix.artifact }}" "ChronoScaleStudio-${VERSION}-linux"

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: |
          VERSION=$(cat VERSION)
          cd dist
          tar czf "../${{ matrix.artifact }}" "ChronoScaleStudio-${VERSION}-macos"

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $VERSION = Get-Content VERSION -Raw
          $VERSION = $VERSION.Trim()
          Compress-Archive -Path "dist\ChronoScaleStudio-${VERSION}-windows" -DestinationPath "${{ matrix.artifact }}"

      # Upload artifact
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # Create GitHub Release when tag is pushed
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.zip
          generate_release_notes: true
